<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lifebook 인생 나무 포스터 — A2 마스터 템플릿 (3-branch) v0.1
  
  구현 방식: 슬롯 템플릿 + 데이터 주입 (사양 §6 권장)
  나무 종류: 느티나무 (한국 마을 정자나무, 장수·뿌리·가문 정서)
  스타일: 라인 + 잔잔한 색 채움 (따뜻한 손그림 톤)
  잎 표현: 점·타원 군집 (간소, 인쇄 안전)
  계절 배경: 사용 안 함
  
  토큰: 연혁 포스터 v0.1과 동일 (색·타이포·간격)
  샘플 데이터: 박명자 님 (1942~2023, 14개 사건, 3 챕터)
  
  슬롯 ID 규칙 (엔진 인계):
    slot-cN-eM  : 챕터 N, 사건 M (leaf/flower/fruit)
    label-cN-eM : 해당 사건 텍스트 슬롯
    root-text   : 출생지·부모 영역
    chapter-N   : 챕터 레이블
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 594"
     width="420mm" height="594mm">

  <title>박명자 님의 인생 나무 — 3-branch 마스터 v0.1</title>

  <defs>
    <!-- 한지 결 패턴 (연혁 포스터와 동일) -->
    <pattern id="hanji" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <line x1="2" y1="3" x2="7" y2="4" stroke="#a89373" stroke-width="0.08"/>
      <line x1="9" y1="16" x2="15" y2="17" stroke="#a89373" stroke-width="0.08"/>
      <line x1="16" y1="8" x2="20" y2="10" stroke="#a89373" stroke-width="0.08"/>
      <line x1="3" y1="13" x2="6" y2="14" stroke="#a89373" stroke-width="0.06"/>
      <circle cx="5" cy="10" r="0.25" fill="#a89373"/>
      <circle cx="13" cy="6" r="0.2" fill="#a89373"/>
      <circle cx="18" cy="15" r="0.25" fill="#a89373"/>
    </pattern>

    <!-- 잎 심볼 (일반 사건) -->
    <symbol id="leaf-s" viewBox="0 0 7 5">
      <ellipse cx="3.5" cy="2.5" rx="3" ry="1.8" fill="currentColor"/>
    </symbol>

    <!-- 꽃 심볼 (기쁜·중요 사건) -->
    <symbol id="flower-s" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="2.8" fill="currentColor"/>
      <ellipse cx="7" cy="2.5" rx="1.6" ry="2.2" fill="currentColor" opacity="0.72"/>
      <ellipse cx="7" cy="11.5" rx="1.6" ry="2.2" fill="currentColor" opacity="0.72"/>
      <ellipse cx="2.5" cy="7" rx="2.2" ry="1.6" fill="currentColor" opacity="0.72"/>
      <ellipse cx="11.5" cy="7" rx="2.2" ry="1.6" fill="currentColor" opacity="0.72"/>
    </symbol>

    <!-- 열매 심볼 (결실: 자녀·손주·은퇴) -->
    <symbol id="fruit-s" viewBox="0 0 12 14">
      <circle cx="6" cy="8" r="5" fill="currentColor"/>
      <path d="M 6 3 C 6 0.5 8.5 0 8.5 1.8" stroke="currentColor" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <ellipse cx="5" cy="3.5" rx="1.8" ry="1" fill="currentColor" opacity="0.6" transform="rotate(-20 5 3.5)"/>
    </symbol>

    <!-- 새 심볼 (소중한 인연 — 인물 기록) -->
    <symbol id="bird-s" viewBox="0 0 14 9">
      <path d="M 1 5 C 3.5 2.5 5.5 1.5 7 2.8 C 8.5 1.5 10.5 2.5 13 5" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <path d="M 7 2.8 L 7.2 6" stroke="currentColor" stroke-width="0.8" fill="none"/>
    </symbol>

    <style>
      .idx-line { font-family:'Pretendard','Noto Sans KR',sans-serif; font-size:3.5px; fill:#857C72; }
      .chapter-lbl { font-family:'Noto Serif KR',serif; font-size:5px; font-weight:700; fill:#5C3820; }
      .event-lbl { font-family:'Pretendard','Noto Sans KR',sans-serif; font-size:3.5px; fill:#2A2520; }
      .year-lbl { font-family:'Pretendard','Noto Sans KR',sans-serif; font-size:3px; font-weight:700; fill:#5C3820; }
    </style>
  </defs>

  <!-- ===== Layer 1: 종이 배경 ===== -->
  <rect x="0" y="0" width="420" height="594" fill="#FAF7F0"/>

  <!-- ===== Layer 2: 한지 결 텍스처 ===== -->
  <rect x="0" y="0" width="420" height="594" fill="url(#hanji)" opacity="0.55"/>

  <!-- ===== Layer 3: 제목 영역 (y: 0–100) ===== -->
  <g text-anchor="middle">
    <text x="210" y="22" font-family="'Pretendard',sans-serif" font-size="3.53" font-weight="500" fill="#857C72" letter-spacing="2">L I F E B O O K</text>
    <text id="title-name" x="210" y="50" font-family="'Noto Serif KR',serif" font-size="19" font-weight="700" fill="#2A2520" letter-spacing="0.3">박명자 님의 인생 나무</text>
    <text x="210" y="70" font-family="'Noto Serif KR',serif" font-size="9" font-weight="400" fill="#5C534A" letter-spacing="1">큰 줄기</text>
    <line x1="178" y1="82" x2="200" y2="82" stroke="#C8923D" stroke-width="0.4"/>
    <circle cx="210" cy="82" r="1.4" fill="#C8923D"/>
    <line x1="220" y1="82" x2="242" y2="82" stroke="#C8923D" stroke-width="0.4"/>
  </g>

  <!-- ===== Layer 4: 뿌리 (roots, y: 462–490) ===== -->
  <g id="roots" fill="none">
    <!-- 뿌리 좌 1 -->
    <path d="M 198 468 C 186 476 168 482 148 486" stroke="#5C3820" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 뿌리 좌 세근 -->
    <path d="M 168 482 C 160 488 152 492 142 494" stroke="#5C3820" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 뿌리 우 1 -->
    <path d="M 222 468 C 234 476 252 482 272 486" stroke="#5C3820" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 뿌리 우 세근 -->
    <path d="M 252 482 C 260 488 268 492 278 494" stroke="#5C3820" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 뿌리 중앙 -->
    <path d="M 210 470 C 210 480 208 488 206 494" stroke="#5C3820" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 뿌리 텍스트 슬롯 -->
  <g id="root-text" text-anchor="middle">
    <text x="210" y="502" font-family="'Noto Serif KR',serif" font-size="4.5" fill="#5C3820" font-weight="500">충북 청주 · 1942</text>
    <text x="210" y="508" font-family="'Pretendard',sans-serif" font-size="3.2" fill="#857C72">아버지 박○○ · 어머니 김○○</text>
  </g>

  <!-- ===== Layer 5: 줄기 (trunk) ===== -->
  <!-- 느티나무 특성: 아래는 넓고 위로 갈수록 좁아지며 퍼짐 -->
  <g id="trunk">
    <!-- 줄기 본체 (filled polygon, bezier) -->
    <path d="
      M 196 468
      C 193 400, 193 330, 200 215
      L 220 215
      C 227 330, 227 400, 224 468
      Z
    " fill="#6B4226" opacity="0.88"/>

    <!-- 줄기 결 (표면 느낌, 가는 라인) -->
    <path d="M 203 440 C 203 380 204 320 206 230" stroke="#8B5E3C" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M 214 445 C 215 385 215 325 214 235" stroke="#8B5E3C" stroke-width="0.3" fill="none" opacity="0.4"/>
  </g>

  <!-- ===== Layer 6: 가지 3개 ===== -->

  <!-- [가지 1] 어린 시절 (우측 하단, 분기 y≈430) -->
  <g id="branch-1">
    <path d="
      M 219 436
      C 248 422, 296 400, 340 372
      L 344 364
      C 297 390, 248 412, 220 426
      Z
    " fill="#7A5030" opacity="0.85"/>
    <!-- 가지 표면 라인 -->
    <path d="M 230 428 C 260 412 305 392 342 368" stroke="#8B5E3C" stroke-width="0.3" fill="none" opacity="0.5"/>

    <!-- 잔가지 1-1: 1942 출생 -->
    <line x1="252" y1="415" x2="238" y2="393" stroke="#8B5E3C" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 잎 군집 (일반 사건) — slot id: slot-c1-e1 -->
    <g id="slot-c1-e1" color="#6B8C5A">
      <use href="#leaf-s" x="228" y="382" width="8" height="6"/>
      <use href="#leaf-s" x="234" y="379" width="7" height="5" transform="rotate(20 238 382)"/>
      <use href="#leaf-s" x="232" y="386" width="6" height="4" transform="rotate(-15 235 388)"/>
    </g>
    <text id="label-c1-e1" class="year-lbl" x="238" y="378">1942</text>
    <text id="label-c1-e1-t" class="event-lbl" x="238" y="374">충북 청주 출생</text>

    <!-- 잔가지 1-2: 1949 피난 -->
    <line x1="272" y1="404" x2="260" y2="382" stroke="#8B5E3C" stroke-width="1.1" stroke-linecap="round"/>
    <g id="slot-c1-e2" color="#6B8C5A">
      <use href="#leaf-s" x="251" y="371" width="8" height="6"/>
      <use href="#leaf-s" x="257" y="368" width="7" height="5" transform="rotate(15 261 371)"/>
      <use href="#leaf-s" x="255" y="375" width="6" height="4" transform="rotate(-20 258 377)"/>
    </g>
    <text id="label-c1-e2" class="year-lbl" x="260" y="367">1949</text>
    <text id="label-c1-e2-t" class="event-lbl" x="260" y="363">한국전쟁 피난</text>

    <!-- 잔가지 1-3: 1956 입학 -->
    <line x1="296" y1="392" x2="282" y2="370" stroke="#8B5E3C" stroke-width="1.0" stroke-linecap="round"/>
    <g id="slot-c1-e3" color="#6B8C5A">
      <use href="#leaf-s" x="273" y="359" width="8" height="6"/>
      <use href="#leaf-s" x="279" y="356" width="7" height="5" transform="rotate(20 283 359)"/>
      <use href="#leaf-s" x="277" y="363" width="6" height="4" transform="rotate(-15 280 365)"/>
    </g>
    <text id="label-c1-e3" class="year-lbl" x="281" y="355">1956</text>
    <text id="label-c1-e3-t" class="event-lbl" x="281" y="351">국민학교 입학</text>

    <!-- 잔가지 1-4: 1962 고등학교 -->
    <line x1="320" y1="380" x2="306" y2="358" stroke="#8B5E3C" stroke-width="0.9" stroke-linecap="round"/>
    <g id="slot-c1-e4" color="#6B8C5A">
      <use href="#leaf-s" x="297" y="347" width="7" height="5"/>
      <use href="#leaf-s" x="303" y="344" width="7" height="5" transform="rotate(20 307 347)"/>
      <use href="#leaf-s" x="301" y="351" width="6" height="4" transform="rotate(-15 304 353)"/>
    </g>
    <text id="label-c1-e4" class="year-lbl" x="305" y="343">1962</text>
    <text id="label-c1-e4-t" class="event-lbl" x="305" y="339">청주고등학교 입학</text>

    <!-- 챕터 1 레이블 -->
    <text id="chapter-1" class="chapter-lbl" x="350" y="370">어린 시절</text>
  </g>

  <!-- [가지 2] 성인기 (좌측 중간, 분기 y≈328) -->
  <g id="branch-2">
    <path d="
      M 199 322
      C 172 316, 124 298, 76 275
      L 74 283
      C 121 306, 170 324, 199 334
      Z
    " fill="#7A5030" opacity="0.82"/>
    <path d="M 190 328 C 162 320 118 302 78 279" stroke="#8B5E3C" stroke-width="0.3" fill="none" opacity="0.5"/>

    <!-- 잔가지 2-1: 1968 서울 상경 -->
    <line x1="175" y1="313" x2="188" y2="291" stroke="#8B5E3C" stroke-width="1.2" stroke-linecap="round"/>
    <g id="slot-c2-e1" color="#6B8C5A">
      <use href="#leaf-s" x="182" y="280" width="8" height="6"/>
      <use href="#leaf-s" x="188" y="277" width="7" height="5" transform="rotate(-15 191 280)"/>
      <use href="#leaf-s" x="185" y="285" width="6" height="4" transform="rotate(20 188 287)"/>
    </g>
    <text id="label-c2-e1" class="year-lbl" x="192" y="276">1968</text>
    <text id="label-c2-e1-t" class="event-lbl" x="192" y="272">서울 상경, 첫 직장</text>

    <!-- 잔가지 2-2: 1972 결혼 (꽃) -->
    <line x1="155" y1="305" x2="168" y2="283" stroke="#8B5E3C" stroke-width="1.1" stroke-linecap="round"/>
    <!-- 꽃 슬롯 — slot id: slot-c2-e2 -->
    <g id="slot-c2-e2" color="#C8923D">
      <use href="#flower-s" x="160" y="268" width="14" height="14"/>
    </g>
    <text id="label-c2-e2" class="year-lbl" x="168" y="264">1972</text>
    <text id="label-c2-e2-t" class="event-lbl" x="168" y="260">결혼</text>

    <!-- 잔가지 2-3: 1974 큰딸 출생 (꽃) -->
    <line x1="136" y1="296" x2="148" y2="274" stroke="#8B5E3C" stroke-width="1.0" stroke-linecap="round"/>
    <g id="slot-c2-e3" color="#C8923D">
      <use href="#flower-s" x="140" y="259" width="14" height="14"/>
    </g>
    <text id="label-c2-e3" class="year-lbl" x="148" y="255">1974</text>
    <text id="label-c2-e3-t" class="event-lbl" x="148" y="251">큰딸 출생</text>

    <!-- 잔가지 2-4: 1977 작은아들 출생 (꽃) -->
    <line x1="118" y1="287" x2="130" y2="265" stroke="#8B5E3C" stroke-width="1.0" stroke-linecap="round"/>
    <g id="slot-c2-e4" color="#C8923D">
      <use href="#flower-s" x="122" y="250" width="14" height="14"/>
    </g>
    <text id="label-c2-e4" class="year-lbl" x="130" y="246">1977</text>
    <text id="label-c2-e4-t" class="event-lbl" x="130" y="242">작은아들 출생</text>

    <!-- 잔가지 2-5: 1985 자영업 -->
    <line x1="100" y1="280" x2="112" y2="258" stroke="#8B5E3C" stroke-width="0.9" stroke-linecap="round"/>
    <g id="slot-c2-e5" color="#6B8C5A">
      <use href="#leaf-s" x="103" y="247" width="8" height="6"/>
      <use href="#leaf-s" x="109" y="244" width="7" height="5" transform="rotate(-15 112 247)"/>
      <use href="#leaf-s" x="107" y="251" width="6" height="4" transform="rotate(20 110 253)"/>
    </g>
    <text id="label-c2-e5" class="year-lbl" x="113" y="243">1985</text>
    <text id="label-c2-e5-t" class="event-lbl" x="113" y="239">자영업 시작</text>

    <!-- 잔가지 2-6: 1995 큰딸 결혼 -->
    <line x1="84" y1="272" x2="95" y2="250" stroke="#8B5E3C" stroke-width="0.9" stroke-linecap="round"/>
    <g id="slot-c2-e6" color="#6B8C5A">
      <use href="#leaf-s" x="86" y="239" width="8" height="6"/>
      <use href="#leaf-s" x="92" y="236" width="7" height="5" transform="rotate(-20 95 239)"/>
      <use href="#leaf-s" x="90" y="243" width="6" height="4" transform="rotate(15 93 245)"/>
    </g>
    <text id="label-c2-e6" class="year-lbl" x="96" y="235">1995</text>
    <text id="label-c2-e6-t" class="event-lbl" x="96" y="231">큰딸 결혼</text>

    <!-- 챕터 2 레이블 -->
    <text id="chapter-2" class="chapter-lbl" x="20" y="246" text-anchor="start">성인기</text>
  </g>

  <!-- [가지 3] 노년기 (우측 상단, 분기 y≈232) -->
  <g id="branch-3">
    <path d="
      M 219 237
      C 248 226, 292 206, 338 175
      L 341 168
      C 294 198, 249 218, 220 228
      Z
    " fill="#7A5030" opacity="0.78"/>
    <path d="M 228 233 C 258 222 298 202 340 171" stroke="#8B5E3C" stroke-width="0.3" fill="none" opacity="0.5"/>

    <!-- 잔가지 3-1: 2003 첫 손주 (열매) -->
    <line x1="256" y1="217" x2="244" y2="196" stroke="#8B5E3C" stroke-width="1.1" stroke-linecap="round"/>
    <!-- 열매 슬롯 — slot id: slot-c3-e1 -->
    <g id="slot-c3-e1" color="#C8603D">
      <use href="#fruit-s" x="236" y="181" width="12" height="14"/>
    </g>
    <text id="label-c3-e1" class="year-lbl" x="246" y="181">2003</text>
    <text id="label-c3-e1-t" class="event-lbl" x="246" y="177">첫 손주</text>

    <!-- 잔가지 3-2: 2008 은퇴 -->
    <line x1="280" y1="204" x2="268" y2="184" stroke="#8B5E3C" stroke-width="1.0" stroke-linecap="round"/>
    <g id="slot-c3-e2" color="#6B8C5A">
      <use href="#leaf-s" x="259" y="173" width="8" height="6"/>
      <use href="#leaf-s" x="265" y="170" width="7" height="5" transform="rotate(-15 268 173)"/>
      <use href="#leaf-s" x="263" y="177" width="6" height="4" transform="rotate(20 266 179)"/>
    </g>
    <text id="label-c3-e2" class="year-lbl" x="269" y="169">2008</text>
    <text id="label-c3-e2-t" class="event-lbl" x="269" y="165">은퇴</text>

    <!-- 잔가지 3-3: 2015 일본 여행 -->
    <line x1="305" y1="192" x2="293" y2="172" stroke="#8B5E3C" stroke-width="0.9" stroke-linecap="round"/>
    <g id="slot-c3-e3" color="#6B8C5A">
      <use href="#leaf-s" x="284" y="161" width="8" height="6"/>
      <use href="#leaf-s" x="290" y="158" width="7" height="5" transform="rotate(-20 293 161)"/>
      <use href="#leaf-s" x="288" y="165" width="6" height="4" transform="rotate(15 291 167)"/>
    </g>
    <text id="label-c3-e3" class="year-lbl" x="294" y="157">2015</text>
    <text id="label-c3-e3-t" class="event-lbl" x="294" y="153">부부 일본 여행</text>

    <!-- 잔가지 3-4: 2023 팔순 (꽃) -->
    <line x1="326" y1="180" x2="316" y2="160" stroke="#8B5E3C" stroke-width="0.9" stroke-linecap="round"/>
    <g id="slot-c3-e4" color="#C8923D">
      <use href="#flower-s" x="308" y="144" width="14" height="14"/>
    </g>
    <text id="label-c3-e4" class="year-lbl" x="318" y="143">2023</text>
    <text id="label-c3-e4-t" class="event-lbl" x="318" y="139">팔순 잔치</text>

    <!-- 챕터 3 레이블 -->
    <text id="chapter-3" class="chapter-lbl" x="350" y="172">노년기</text>
  </g>

  <!-- ===== Layer 7: 수관 배경 잎 군집 (캐노피 분위기) ===== -->
  <!-- 느티나무 특성: 넓게 퍼지는 잎 무리로 수관 형성 -->
  <g id="canopy" fill="#6B8C5A" opacity="0.18">
    <ellipse cx="200" cy="175" rx="52" ry="40"/>
    <ellipse cx="155" cy="248" rx="44" ry="34"/>
    <ellipse cx="300" cy="168" rx="42" ry="32"/>
    <ellipse cx="120" cy="278" rx="36" ry="28"/>
    <ellipse cx="250" cy="145" rx="38" ry="28"/>
    <ellipse cx="175" cy="210" rx="32" ry="24"/>
  </g>

  <!-- ===== Layer 8: 범례 (잎/꽃/열매 설명) ===== -->
  <g id="legend" transform="translate(20, 390)">
    <text font-family="'Pretendard',sans-serif" font-size="3.5" font-weight="500" fill="#5C534A" y="0">범례</text>
    <!-- 잎 -->
    <g transform="translate(0, 6)">
      <use href="#leaf-s" x="0" y="0" width="8" height="6" color="#6B8C5A"/>
      <text class="event-lbl" x="10" y="5">일반 사건</text>
    </g>
    <!-- 꽃 -->
    <g transform="translate(0, 15)">
      <use href="#flower-s" x="0" y="0" width="10" height="10" color="#C8923D"/>
      <text class="event-lbl" x="12" y="7">기쁜·중요 사건</text>
    </g>
    <!-- 열매 -->
    <g transform="translate(0, 27)">
      <use href="#fruit-s" x="0" y="0" width="9" height="10" color="#C8603D"/>
      <text class="event-lbl" x="12" y="7">결실 (자녀·손주·은퇴)</text>
    </g>
